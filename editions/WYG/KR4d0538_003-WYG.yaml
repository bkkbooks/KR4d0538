body:
  text: 栲栳山人詩集卷下元岑安卿撰近體詩五七言律次王敬助見寄韻六首開元古名刹獨客思凄然不佩六國印原無二頃田吾猶甘自守人政不須憐堪笑陶朱子西施共上船髮踈常自理心苦欲頻搥夜月乆無夢秋風忽寄詩來同顔子樂聊復宋生悲何怪孔文舉人猶呼作兒臥龍蟠屈處首尾枕長河臺榭基猶在衣冠人若何登臨雲水遠感慨草莱多無限扳援志青松有女蘿琴書曽遠訪訪我海東濵對酒不成醉看花惟惜春青燈書有味白眼世無人儘有耕桑趣翛然一幸民祕圖留滯日鄉思已凄凄黄卷挑燈閲紅粧掩鏡啼交新情僶俛感舊恨低迷語及深知處應憐獨鶴棲山陰歸賀老唐室尚昇平詩有清狂語心無寵辱驚賡歌希傑作出處見真情􅆥攷前人志非君孰並行八月十六日夜月蝕片玉出東溟斯須怪事生皇天一眼下土萬民驚蕩蕩雲無迹暉暉星愈明嫦娥恨孤寡誰為斬蟇精寄易直兄别去将三載相望路一千觀光誠有意問道恐無縁夢墮柯山月愁迷舜水烟㸔雲應見憶只恐不成眠悼吳武伯儒林正衰落武伯又何如白髮雙親淚黄泉萬卷書儀刑宗吾舊交彩戇花餘應有修文約相從地下居八月十九日宿慈水車輪橋野人家夜聞犬吠有一人立門首忽問曰鷄鳴否詰之乃入縣膺役者蓋卜夜之早晚恐違官事也感而枕上有作官道月瞢瞢微雲弄薄晴居人聞犬吠行客問鷄鳴王者化無外公家事有程民心雖謹畏何日是昇平九月三日晚與鄭元康對坐至日暮小雨後歸宿偶成歸人歸未得天際復生陰小雨濕官道清砧傷客心蕭肥蘭蕙瘦雀語鳳鸞瘖坐對滎陽老空懷正始音冬至前一日到游源及歸知元善亦自彼囘途中遇風不得相近偶成夜醉重峯酒曉行游徑霜急風來廣漠初日在微茫交臂恨相失思君還自傷翛然鵷鷺質鷄􅕽愧聨行送康穆菴遊浙右諸山穆菴字子元西林子元子觸熱又何之一語未深契瓣香還為誰月庭秋影滿雲閣定遲倘有相思句因風幸見貽和來竺西見寄歲暮重峰寺詩文喜共論暝雲昬疊嶂寒雨滯孤村别後病翻􅇵書來身幸存藤枝肯扶老終扣月中門見乞食者日多感而有作齒豁鬢蕭颼幽棲東海陬家貧難施與世亂易誅求饟道二千里戈船五百艘招安復征討食肉豈無謀夏夜偶成雨下山雲黒雲收山月明凉風蚊蚋散活水蚓蛙鳴露頂中庭坐披衣曲砌行遥憐荷戈士觸熱入占城蝙蝠蠢爾不知賤高高亦戾天饑惟掠蚊蚋飛不避鷹鸇白晝身無措黄昏意自便緬思讒佞軰與汝可周旋沙縣小樓半載客延平沙陽夢愈驚蛩鳴深巷靜月昃半樓明故國三千里歸途一月程西風在庭樹絺綌不勝情偶成溽暑南州甚我來成感傷日長聊假寐夢短亦還鄉水汲龍津渌茶烹鳳苑香長歌憶歸去屈指待清商寄易禮弟越客半年住閩溪千里流山高不礙夢日暮易為愁兄弟終相憶鄉閭非所憂何當先壠側同理釣魚舟寄杜洲鄉學讀書諸弟姪時王敬助為師負笈少年志讀書無患貧聚螢時已邁映雪事當新沈黙東墟老凄凉江左賔興居便飲食徳性藉陶甄陋巷窮詩禮荒陬集薦紳緇衣心眷眷貝錦語諄諄醴設穆生闕天台存舊譜地望著清光教育文辭贍漸磨道義彰移官杜洲曲開講樹山傍曉日臯比暖薰風絳帳凉青衿諸俊彦綵服兩兒郎弟子堪榱桷先生實棟梁羣飛迷蓊鬰駿足識康荘歲月考書滿風雲際㑹良伏龍終偃蹇鳴鶴自翺翔執友陳供帳擕家上小航錦囊詩匼匝蒼玉佩鏗鏘壮志期高翥歸心馳故鄉赤城霞粲粲秀嶺日蒼蒼巾子峰頭月瓊臺石上霜暫伸懷土樂爰整好遊装下捧薇垣檄上霑楓陛香公車應薦剡耆徳必文章不日看除目何時舉賀觴佳音如我寄魚鴈在滄浪送杜洲山長劉公輔昭代文明治先儒理化行九疇皇極建萬象㤗堦平一徳乾坤正諸經日月明桂宫紛珮玦璧水集簮纓丹穴生靈鳳滄溟出大鯨岷峨山鬰嵂苕霅水澄泓兩地氣鍾秀百年人間生宣尼垂筆削文節闡家聲孝友心無忝忠貞石可銘力言扶正學格論見深誠之子諸孫行為儒命世英棘闈初戰藝薇省即揚名虎榜斯髙揭龍門忽下傾褐衣雖見錫黄卷愈研精捧檄來東壁臺成樂毅親寧為獱見笑勿以蠖求伸喋喋羞同志棲棲憶故人鳥飛應擇木魚逝必驚綸爆竹歲云暮椒盤日便春依然絃誦地童穉㑹比鄰送陳元剛廵檢塟親畢還烏江治所鳳厯新頒朔椒盤尚獻春故人來遠道舊事憶比鄰童子常遊釣先君辱誨諄妙年期奮迅中道適邅迍處困寧東海觀光向北辰策勲精國語捧檄佐王臣案牘需翻譯蠻荒頼警廵一官心未慊再世氣方振有弟嗟淪落無家共苦辛南遊絶交廣東望極甌閩天路飛揚濶家山感慨頻潯陽新閥閲檇李舊宗姻淺土雙親念浮生百歲身亟歸衝雨雪努力剪荆榛馬鬛封猶古鵬程路轉新行看袍換緑莫歎鬢如銀折栁歌金縷看梅想玉人停杯心眷眷分袂禮彬彬我已辜新渥君毋忘昔貧願持清白操隨地福斯民送杜洲殷山長歸天台殷肇土茫茫詩歌𤣥鳥祥建邦思得姓易代復賔王徳澤流千古雲礽徧四方深源還輔晋鄭國亦興唐奕奕家聲遠綿綿世澤揚停舟先過我擁帚許相迎講道無餘藴論文得細詳詞章漢宗正詩筆李長庚禮展慈湖奠心摇微國旌先公同􅇡謫後裔借尊榮僑館甘藜藿芳洲采杜蘅春風閑杖䇿夜雨短燈檠浮海瞻龍仗登臯聽鶴鳴三年書滿考一旦趣歸程執手論交契持觴叙别情但期趨玉陛焉在遺金籯旋舍斑衣舞歸舟綵帳輕庭闈心晏晏交友喜盈盈侍次還鄉舉趨班復帝京㨗音如我報莫俟鴈南征危太樸以經筵檢討奉詔求故宋遺書作詩贈之宣文閣上危夫子日侍經筵眷遇優祗閲秘書供御覽旁求遺籍賛皇猷琅琊南渡終承晋昭烈西征亦繼劉公論自存千載下聖人直筆在春秋使星東下斗牛墟潛徳幽光待發舒昭代進修三國史詞臣來購四方書是非往事詢黄髮咫尺清光動玉除若問江淮今日政願陳比法話樵漁簡王東臯劍光飛射斗牛寒應笑如今鋏尚彈萬國梯航朝帝闕百年禮樂付儒冠黄金用盡無顔色白髪交深見肺肝重念蒲輪東魯客暮年名動漢朝端送易直縣尹兄赴松溪武􅆥山水最清佳路轉三衢未覺賒百里絃歌初作宰一官琴鶴早辭家夜凉燈影連書屋溪近松聲雜吏衙遥想政成閑暇日錦牋試墨品春茶次鄭元秉陪劉同知謁子陵祠韻畫舫秋江集縉紳公餘來弔故人魂子陵名節千年墓文叔雲礽百世孫高閣清風生玉麈空山凉月墮金尊獨慚老朽無由到只有新詩可共論遊東山寺贈尉東岡東山景物吾州稀蓮宫璀璨浮春輝過湖人騎白雪馬待客僧立青苔磯花邊舉杯酒一斗石上解衣松十圍最愛東岡老禪伯夜窻為我談𤣥機次葉敬常編修危太樸檢討東湖嘉澤廟倡和詩韻太史文章星斗光叢祠新製耀仙鄉兩賢嘉澤千年在萬頃清風五月凉烟際樓臺澄晚色雨餘蘭芷發天香經筵檢討臨川彦唱和尤聞感慨長遣興去年不死今年活直語半生人不禁老去謗書從滿篋春來樂事搃闗心觀魚濯足滄浪水聽鳥支笻楊栁陰我已無心呌閶閤玉皇高拱紫雲深重峰寺祈雨後柬李元善二律麈尾高揮演大乘火雲不散愈崚嶒漫同三島吟詩客閑訪重峰醉酒僧僧謂竺西翠竹陰移凉夢遠碧蓮香散暮雲凝歸途未即天瓢注猶有長風解欝蒸玉勒花􅔕達宦乗我惟兩脚踏崚嶒山林不見休官客雲水何如問道僧老鶴夢囘清露滴佳人信杳碧雲凝五旬不雨心如醉頼有新篇破溽蒸送友朝日崑邱彩鳳鳴秋風黄鵠共飛騰朝廷自召杜清碧草澤寧忘嚴子陵萬仭振衣闕栲栳山人詩集巻下
