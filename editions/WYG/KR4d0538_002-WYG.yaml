body:
  text: 拷栳山人詩集巻中元岑安卿撰古詩七言題太真春睡圖東風吹香蕩晴晝長安宫苑花如繡海棠一夜折輕紅淑氣薫蒸困醇酎太真徙倚沈香亭宿酲未解春冥冥眉峰歛翠翳秋水侍兒夾擁花娉婷玉牀膩滑芙蓉展水沉烟梟金屏暖丹腮融潤珊瑚溫寳釵斜鬌烏雲綰上皇玉笛那敢吹地衣紅皺靴輕移傳令别殿罷歌舞流鸎不語游絲垂漁陽鼙鼓邊塵動臺閣無言卿士懵婦人一睡四海昬主暗臣諛總如夢翠華西狩九廟隳禍胎未剪三軍疑馬嵬之夢生死訣一時悔禍人心歸驪山舉燧供歡笑犬戎蹴踏周原草丹青誰究春睡圖後世不須箴大寳樵隠詩為淛東僉事畢公賦山人隠跡樵空峒天王賜見明光宫執柯伐柯喻為學兹理講貫融心胷侁侁胄子國元氣有命剖析開昏蒙斧斤斵就棟梁器欂櫨椳楔紛相從賢能往往布清要利澤天下山人功功成又復視民俗綉衣玉斧蓬萊東翦除枳棘毓嘉木坐聽於越歌時雍㑹稽秦望嘗獨往此心猶羡樵徑風次韓明善題推篷圖青松陰陰間修竹六月翛然破炎溽梅花一味只宜冬江上孤舟水邊屋筆端春信囘孤根鮫綃淺抺𤣥霜㾗江南煙雨正愁絶一枝喚醒羅浮魂無聲詩生有聲畫吟詠工夫見揮洒坡翁仙去二百春夢繞松風古亭下兹花清致誰堪當孤山題品淵源長推篷細認心淒涼鼻端彷彿聞天香勉宋無逸向學蚌胎抉珠光陸離山石韞玊形瑰竒民生適秉俊秀姿如玊含潤珠生輝廣平世徳遠已微雲礽奮發思前徽輕獧不遂裘馬肥下帷恬淡虀鹽宜讀書待旦心孜孜穴壁睥睨晨光熹我憶視子齠齓時髧髮欝爾青齊眉椿庭期待余所知近師囑汝吾儒歸只今年纔二十幾瑰詞􅇨語超倫夷示予琬琰潤且滋蠅頭㸃漆光纍纍蘭苕芬馥翡翠飛鯨魚掉尾横天池秋風丹桂香紛霏明年期爾扳高枝而翁陰祐應扶持搏風九萬非難期但愁老眼将昬眵羽翼不覩連雲垂墜馬漫成録示諸弟姪君不見杜少陵劍南宣謀老且窮瞿塘一蹶傷其躬又不見蕭齊司徒䘮名節墮水被誚訾超宗我慚人馬仆石梁翻身直下馮夷宫衣襦沾濕愧乗鯉鞍轡出沒如游龍康荘獨步信便適陟危履險由來凶從兹時買兩芒屫闕西東和舒宏道轆轤汲井羞綆短海納江河不知滿大材小器量不同火鼠氷蠶自寒暖人能𢎞道斯為儒餘光端可昭昏愚君家信道非凡夫臨危嘗解捐其軀眼明見此渥洼汗血之名駒胡為尚滯禹門㸃額之龍魚譬猶卞和白壁隋侯珠未遇具眼寧同瓦礫迷榛墟君文璀璨新出之珊瑚君材粹美已琢之璠璵誰能與君對擲争梟盧但當再拜捋彼桓伊鬚裁詩再寄驚我心糢糊我惟裏手閣筆成欷歔武夫幸厠珩與琚定知鄙我生嗟吁杜洲水暖飛羣鳬管絃畫舫如平居慎勿同樂辜三餘五湖一舸今何如題晴川圖清谿粼粼生淺花曉日倒射摇金沙翩然雙鷺下危石玉雪照影無纎瑕溪邊小景入圖畫青烟緑樹漁翁家漁翁歸來歌未終鷺丝忽起蘆花風囘眸遙望不可極但見白玉飛青空昔年夜宿瀟湘浦徹曉不眠聽急雨解衣曵杖立沙頭何似今朝得容與長安馬寒泥沒腹雪滿朝衣凍肩縮試令援筆題此圖長篇應賦歸來曲和王子英醉後歌至人超六合造物期同遊飄飄無根蓬蕩蕩不繫舟江河罔知返日夕惟東流鳴鳩爾何為戸牖思綢繆人生底用愁如織朝看朱顔暮無色何如生死兩忘懷日月梭飛任交擲君不見秦皇入海求方瞳包括區宇摧羣雄沙邱輼輬鮑魚臭一世萬世今何功又不見班生投筆踰流沙封侯萬里威遠加玉門東望不可入上書祈請心咨嗟我生于人何所為即死於人何所悲烏鳶螻蟻何所苦珠襦玊柙何所輝不如生前賦詩飲酒放浪山水間死與造物黙黙還同歸正月聞鴞有感惡人恒多善人少春來未省聽啼鳥惟有鴟梟最惱人聒聒五更鳴到曉䲭梟䲭梟爾何為萬人怪汝千人譏更有王孫金彈丸遶林逐爾将安歸二月二日大雪寓州郭偶賦詩東風吹寒春漠漠海氛作瞑天昬昬空堦夜落雪一尺起看萬樹梨花雲詩翁撚鬚僵不死開牕强作饑猿蹲欲呵凍筆冩清思甕中餘瀝催頻温山僧積財冨畎畝驅馳後事何紛紛木魚停撾磬聲絶但聽衙皷趨公門何如孤舟釣魚叟一簔獨釣寒江濆送鎦同知劉侯宦轍半天下臺閣府州無不可王良駟馬熟路車楊僕樓船順流柁政刑徳禮隨設施賢智愚頑成切磋朅來貳政臨吾州民習澆漓更偷惰我侯振舉綱目張治劇理繁惟𤨏𤨏每嗟田賦籍不明玉板青綾空疊垜大邦有命獨見推萬指不停吹夜火富民有田不忍欺貧士無田愈閑暇今年賦役稱均平吏不容奸民俗妥侯能施惠澤吾民民亦祝侯膺福嘏祝侯福嘏當何如正笏垂紳輔宗社送陳元綱廵檢塟親畢還烏江東風吹醒遊人夢千里懷歸寸心痛烏江春至雨雪餘白鷺洲晴水消凍錦囊璀璨行色饒畫鷁凌風見飛動陸行更買竹肩輿夾道梅花逓相送春禽不解客心悲曉日高枝作嬌哢渉江還踏西陵道萬壑千岩春渺渺秘圖行認舊遊蹤客星分翠迎歸棹三山東望海茫茫雪浪翻空髻鬟小歸來夜宿故人家白髮青燈炯相照明朝匍匐走重峰淚洒松風石雲島啣哀捧骨閟幽宫馬鬛封高水縈繞行人齊咨風日悲白馬素車來故老送終事已旋有期叙舊杯盤慚草草裁詩聊復餞君行我亦何人􅃍揮掃西江宗𣲖師涪翁邵菴當代文章公持詩為我謁亟丈㸃化金鐵歸陶鎔緘謄遠示塗竄迹咀嚼端可醒昬蒙何妨更致明月片七椀兩腋生清風掃除人世酣醉夢凌雲竟入蓬莱宫西江訪舊期再㑹擷芳更煮康王淙題黄中立樵雲巻三衢仙人石橋奕隅坐野樵心自適不知柯爛歲月深人世歸來已非昔越山客亦樵雲中碧山杳杳雲重重香爐捫蘿春滃欝若耶涉水秋冥濛斧聲丁丁響深谷猿猱鹿豕恒相從懷章太守歸故里讀書處士栖長松古人千載不可見二公出處誰将同君于此計豈長往草衣芒屩姑從容仙人倘遇不須久歸來歌我樵徑風出門偶賦老驥伏櫪風蕭蕭饑鷹側目看青霄驪龍抱珠海底卧虎豹不噬羣狐嘷河邊老人倚墻坐六合茫茫彈丸大平生賸讀古人書倒篋青錢無一箇側聞朝廷遺逸徵集賢著作空盈庭紫薇堂上日午飯世祖山河如砥平題慶元路太守雍吉刺氏傳家録巻六經輔世不可徹照耀今古如日月前聖後聖語合符厯厯盡為忠孝發埜堂太守來甬東下車徳澤春融融撫民餘暇出家乘累葉爵位猶尊崇先翁昔長玉堂署為徳端重心謙冲露香百拜己母疾讓爵同産情相鍾􅊮庭褒錫表宅里雙楹玉篆懸穹窿大君有命治懷慶至今父老歌勲庸尊崇不縁戚里貴忠孝自與天人通中朝閣老更賛詠墨雲揮洒飛蛇龍雄文大筆續前代玉光下燭披長虹親親敬長在一已能使天下皆同風公承世澤将雨露盡洗海國塵埃蒙民風丕變氣甦息温言惻惻蘇疲癃老農家居五雲表引領東望思帡幪願言不日秉旄鉞七州均入甄陶中上為天子宣徳意下慰祖考於無窮詩人作歌頌不朽豐碑百尺看磨礲題鄭學可餘樂齋爰居不識鐘鼓響孔翠赤霄羞飼養滎陽千載不羈人厥後雲礽亦清爽燭溪流水清可斟烏戎山高足瞻仰羡君築室山水間餘樂名齋信竒賞齋前花藥恒芬敷屋上喬松翠相向黄金未散書滿堂白酒要賔不須釀不縁獨冷固栖遲山水情深起遐想人言貧賤樂有餘問君此樂為何如貧而無樂豈我軰冨不好禮尤庸奴貧而有樂富好禮此是人間真丈夫元日有感率成口號示季淵姪軰傚儲光羲體世家三山踰百年讀書作官還種田支分𣲖别五十竈昔日一家同屋眠邇來本大枝葉繁榮枯異體理則然自家有酒自家吃有餘儘可賔客延自家無錢自家守慎勿倣效生寃愆我今新正六十四髮白面黒心未死寡交頗覺鄉黨踈嫉惡何妨宗族忌此心但願子孫賢詩禮家聲勿令墜種田有飰蚕有衣讀書作友天下知紛紛衣錦食肉人馬上相逢知是誰余觀近時詩人往往有以前代臺名為賦者輒用效顰以消餘暇周綱陵􅆥九鼎輕玉帛交錯朝蠻荆態度睥睨志未已積財壘土攙青㝠姬姜麗質鄭衛音臺中燕樂森如林汾沮逺畧肘腋變乾谿一散愁人心荒山饑走歸無所睡酣又失涓人股棘闈深閉䰟魄飛申亥負尸埋淺土章華臺上空子規啼殺游魂終不歸右章華臺吳王築土山為址俯視水雲三百里臺中歌舞萃華麗金碧㠝岏眩珠翠江花泛泛浮䲭􅊂㑹稽思霸甘卑辭千金不買西子笑一舫竟逐陶朱歸丹砌草深麋鹿卧淒淒棘露沾人衣闔廬坵墓虎為衛至今鐘磬聞餘悲游人不悟國傾亡松間援筆題真孃右姑蘇臺巫峯十二青参差石形儼現仙娥姿蒼藤翠水怯凄冷精誠夜感襄王思仙衣縹緲仙裙濕雲影飄颻雨聲急陽臺朝暮不勝情高唐想像愁無極夢中竒遇事杳冥公子雕辭亦胸臆荒凉古廟屹江干臺空不見行雲跡游人悵望尚徘徊古碑寂寂荒莓苔右朝陽臺雕墻峻宇無不亡薊城築宫國乃昌屈身延士禮優异四方英俊如雲翔郭生馬喻真良策亟拜樂卿為上客兵行旬日入臨淄秦楚諸君咸辟易夙心已雪先王耻七十齊城祗餘二君王仙去主帥逃歎息後人非繼志巍臺悲慘朔風號不知騎刼何時招右黄金臺嬴秦北築城萬里芒碭無人識雲氣鴻門斗碎驪山焚漢楚殘民半為鬼重瞳失道身首分沛宫酒叙還鄉恩風雲飛動白日永歌聲激烈悲勲親四方備禦思虎士進取守成良不易長陵崇奉四百春歌臺遺築今荆杞壮哉一曲大風歌千古英雄盡懷愧右歌風臺彭城負險河為障南屹崇臺勢雄壮重瞳奮跡入秦回諸侯攬轡皆東向酒酣蹴馬升崔嵬鬉翻鬛振雲烟開倚鞭四顧示無敵指揮貔虎心雄哉黄金間行亞父去帳下茫然失謀主楚歌聲合潰重圍昔日名騅空故步千年積恨氣未消繞臺泗水撞飛濤右戱馬臺金莖擎露空崔嵬湖臺築恨心猶哀剖桐殯土事曖昧禍機元自長生來壽踰大耋世已稀趙國憸人心險􅇖盗兵誅佞兩非是屈氂督戰猶驚疑銜寃竟隕鳩泉里壺闗三老言非遲向無少卿䕶病已上林僵栁何縁起空餘老淚滴紋甃斑斑相間苔花紫右望思臺漢室分崩成鼎峙銅雀翬飛鄴宫起碧甃漾日覆紋鴛蕙帳凝香集餘妓我觀剏始既驕逸後裔焉知惕奢侈洛陽宫闕凌青霄公卿負土何焦勞玉音親責役夫緩瞬息身首横霜刀荒遊日恣典午肆西陵空掩欺孤智至今硯墨抱遺羞千古奸雄穢青史右銅雀臺萬里長江東入海千年高臺今尚在當時誰道鳯凰來覽徳何人足相待鳳聲悠悠梧葉空謫仙文采流長虹跨鯨一去不復返後人欲語羞雷同海上三山渺何許羣仙騎鳳隔風雨登臨空詠謫仙詩白鷺斜飛過秋浦右鳳凰臺八月上旬出遊晚歸拷峯老人頭雪白竹扇如箕障炎赫徐行阡陌稻花間稚子歌呼手高拍西風吹我衣巾輕鷺絲飛起鸜鵒鳴西山一餉掛龍雨薄暮歸來新月明予讀近時人詩有詠瀟湘八景者輒用效顰以消餘暇岳陽樓昏水雲黑夜揭氷輪破幽寂浮光萬頃躍寒金倒影一規沈素璧霜毫誰幻清絶姿毛髮増寒心辟易何時皷柂逐南遊散髮君山弄虛碧右洞庭秋月黒雲捲空暗衡岳二水爭流風力惡推窗不睹雪珠跳篷底惟聽鳴錯落江猿無聲老蛟吼鯨鯢出沒聞瀺灂素縑揮洒凛高堂座上覊人心戰愕右瀟湘夜雨駱駝水枯圓露觜橘洲霜清平似砥衡陽囘侣羽翮疲接翅連羣飛復止洞庭波濶菰米稀弋人夜榜機心微平明又為稻粱謀來看行跡空嗟咨右平沙落鴈暝雲破紅日色微輕舟冉冉灣寒磯濕罾懸水水猶綴囘光倒射明珠璣怯寒鷗鷺集沙觜側身皷翅疑忘機何當置我蓬屋底一聲欵乃中流歸右漁村落照雨餘山徑溪縈廻小橋野店相因開新烟覆屋色掩映薄日籠樹光熹微芋魁香軟紫薑脆旋沽美酒添尊罍不辭餘潤濕衣袂但惜屐齒傷莓苔右山市晴嵐洞庭波翻天咫尺風慘雲霾四無極水鳬寒死鴻鵠僵冷透漁簔眠不得馮􅊂夜翦瑶臺花瓊英著水輕無跡試令冩入畫圖看衡岳諸峰失遥碧右江天暮雪長江萬里東入海南極蒼梧北踰濟龍驤萬斛駕洪濤去日酸辛歸日熹畫師夙昔諳行色鵝溪半幅留真跡入門嫵媚各有懷誰念山巔望夫石右遠浦歸帆紺宫崔嵬揷蒼冥暮陰凝紫蒙丹青華鯨吼徹日西墜片月漸漸升東溟老僧莫歸尚餘暇松間引鶴榰枯藤不知誰冩逼真景耳邊彷彿聞餘聲右烟寺晚鐘題張彦明所藏剪紙惜花春起早圖流蘇帳巻春寒輕紗忩弄碧天微明軟紅嬌紫怯朝露美人推枕心為驚鬂雲未綰香奩開侍兒側立肩嬰孩黄鶯飛動花影亂停梳睥睨猶相猜誰将妙意寄工巧溪藤雪瑩金刀小丹青退舍松媒枯剪出天真數分杪筌熈傾軋空自誇惟競時人顔色好無聲有聲兩相副此景此詩均壓倒司空慣見了無言應是禪心被花惱美人行錦雲窣地春風軟彩鸞影展烏雲綰綉茸慵理怯餘寒寳鳬烟斷花陰轉露晞香徑苔蘚肥鳳鞋濕翠行遲遲凴闌無語何所思黙㸔雙蝶花間飛短歌行水濁不見石雲深欲無山利欲酷似之翳彼方寸間年來名利嗟已矣如雲過山石沈水底不似莊生形槁木心死灰又不如瞿曇氏面壁九年身不起物來自解鑒妍醜事至常思見非是始知至靜可觀動是非妍醜皆從彼靜中有樂我素諳字我静能斯不愧春花燦爛秋葉零歳月奔馳老将至静能静能可若何歸全湏究曽參㫖悼凱南仲蟠龍老僧凱南仲平生信實無嫌猜袒肩不倚薝蔔樹結跏應坐蓮花臺我來問信黙無語紙旛漠漠飛塵埃不如徹此方解脱菩提明鏡何為哉寄兹息菴乞水墨蒲桃息菴戯墨聞竒古碧蔓縈紆濕凉露聲名籍籍逼老温我未得觀如病瞽剡藤􅉼雪持入山須憶同忩舊情素揮毫倘寄絶倫技當置雲林息遊處元正二日喜雪走筆示諸姪天花夜逐東風來千山萬山白皚皚三陽獻瑞后土澤六出呈巧馮􅆥裁漫空冥冥栁絮起匝地漠漠梨花開玉龍羣飛銀海湧縞鶴萬舞瓊林摧廣寒羽衣離素闕姑射仙子升瑶臺蘇卿嚙氊心壮烈王恭披氅身毰毸山陰返棹迷處所東郭破履行徘徊懸弧鵝鳴誤擊柝㶚橋驢凍疑􅋦枚山僧有時聞折竹野客無處尋真梅枯枝㸃綴生蓓蕾宿麥盖覆埋根荄氣凌市井貴白墮光粲城郭無黄埃翰林石鼎月團片太尉金帳羊羔醅重裀羣飲綉帷底一簔獨釣寒江隈誰憐高士僵欲死坐覺大地春先回歐公白戰不持鐵效顰自愧非其材寒忩一笑呵凍筆誰能為我貽瓊瑰東皇夜駕雲車來縞衣兩盖光皚皚平明散作萬花落幻出天巧非人裁初疑蜚㢘怒驅海倒捲萬疊銀山摧又疑中秋十五夜月色冷浸玻瓈臺恍如天女乘白鶴曼陀落手輕毰毸又如楊花傍簾幕垂垂欲下還徘徊鳥飛無影人跡滅瘦馬僵縮難加枚曉雲無路空有夢暗香不度終非梅色欺山礬玉屑蕋凍屈庭草黄金荄寒威透肌起圓粟冷艶奪目無纎埃呵氷濡我紫毫筆煖湯熱我眞珠醅梁園勝賞猶想像繽紛不辨隩與隈鄒枚司馬不可見妍辭秘思堪抽回謝公作賦千載後只今誰復攄竒材我言諸子毋自縮荆山俯拾皆玫瑰玫瑰一作瓊瑰送宇文别駕江風吹雲天漠漠去官欲行愁雨落沙頭已買一扁舟惟載舊書盈故槖東街西街蠟屐聲冠盖塡門行蹻蹻坐中猶有乞文人囊裏元無贈錢客我願行時天日晴先生此心江水清殷勤相餞一杯酒早聽玉堂鈴索鳴防盗夜行翠蘿滴露絡緯鳴熠燿照影秋水清輕雲度白河漢明月挂半壁生東溟幽人不寐起夜行鉄撾攫地鏗有聲緑林豪客慎勿驚白晝大盗猶縱横十一月初五日初度去年罈津作初度適與書雲節相遇清晨賔從賀新陽日午杯盤亦微具海亭宦客歸來遲薄莫北牕同笑語共誇長至偶生辰似䜟若人増壽數今年在家又初度破屋欺風海濤怒雖有綘蠟剪春紅亦有篆烟騰碧縷妻孥滿目意自真少長相趨禮如故東臯先生予故人寒忩教子甘清貧得錢沽酒還自醉書聲夜夜驚比鄰東平先生李元善酒後歌詩快清健可憐年少亦羞寒褐㡌蒙頭僅留面欲要二妙話綢繆羞殺氷庖酒殽鮮我雖有田未忍賣弟責兒嗔了無怨只慙天子不我知溝壑老填為可歎寄詩慎勿笑痴狂倚樓且㸔南飛鴈再用韻柬李元善故鄆書生美無度飄泊江湖未羞遇貧如東埜詩愈佳歎息無車載家具莫言家具少於車喜有昌黎不平語清名後世期不刋冨貴浮雲何足數讀書惟闞温凊餘女哭男啼不須怒王章昔日臥牛衣靖節茅亦藍縷即今蹭蹬毋自憐變化雲龍豈無故顔生四勿稱仁人負郭二頃猶言貧我田僅足了饘粥苦吟貽笑東西鄰行藏勿用人稱善景逼桑榆幸康健烏紗匼匝僅蒙頭霜鬢鬅鬆亦遮面青山白雲交契深金馬玉堂書問鮮無才無徳空老成下不尤人上無怨與君唱酬心自歡咏歌不足還嗟歎越中小友有來詩相要更賦衡陽鴈寄謝曹峨王子隆海風撼屋屋欲摧洪濤噴雪高崔嵬此人戰慴心死灰客子逺來猶自哀故人見我顔為開暖湯濯足酒滿杯黄柑丹荔錯落堆飯抄雲子光皚皚江上人誰知老朽薄雲高誼今還有明朝風静渡江去蘭芬上下重囘首題平林山詩卷已下皆延平作鄭侯書法妙天下鐫石林生亦文雅延平碑刻不日成坐見東南紙増價我窮出遊羞局促打碑擬向京師鬻只恐天公不我憐一夜風雷轟薦福送建寧鄒仲方赴廣州鼎安廵撿丹青揷空幻飛閣有客談天志寥廓毛錐未足了平生心溢七閩山水郭青衫白㡌提干将黄蕉丹荔畨禺行溪下歌呼溪女舞山鬼不嘯海若藏路經潮陽車緩驅昌黎有廟神靈居升堂酌酒須再拜為問鱷魚今有無上分憲山東僉事五雲仙子來蓬瀛霜花肅肅風泠泠綉衣香拂瘴雲散老龍擎月波心明鸊鵜膏寒浸秋水寳匣生光斗生紫妖氛千里不敢飛狐兎遁形梟獍死九龍當軒翠鸞峙文筆又向天中起欲宣教化踵前賢瞻拜還看下車始泮宫洋洋騰頌聲飛章從祀升延平玉堂芸閣應賛成竚聞畣詔來天庭俗淳民厚期逭刑百世願主斯文盟求葉仲輿冩墨竹扇面此君一日不可無子猷篤愛心歡愉延平官舍斬伐餘稽山倦客心煩紆先生抛官南海來胸中邱壑爭崔嵬筆端造化奮天巧籜龍一夜驚春雷素絹圑團剪秋月願染𤣥霜冩幽絶蕭然便覺風雨生頃刻清寒屏炎熱昔時與可稱絶倫息齋近世尤逼真我持此扇出門去要使襪材咸萃君逢秋髙梧脱葉金井寒璧月夜挂朱闌干銀河萬里浸虛白凌風欲訪乘槎仙金壺箭水聲第一畫角梅花聽悽惻三山樓閣碧海凉老鶴不眠清露滴贈畫龍陳亦所飛龍在天不可識葉公千載餘墨迹洞微復冩牝牡姿壁破㸃晴猶莫測老所三山海上僊貝闕珠宫慣遊厯歸家援筆冩飛騰變化風雲走胸臆但憂真􅎓不可知空使時人寳燕石我來幸逢四世孫筆勢翩翩尤逼真解衣半載梅山住持練扣戸人紛紛畫成不用書亦所便作所翁何所分出門罈津正秋水一笑雙龍忽飛起謝李仲容見贈海風立水天空濛瘴雲晝掩蓬莱宫仙人跨鶴天姥東歸來樓閣昏無蹤九仙山高玉為户廣寒夜訪乘鸞女桂香滴露夢不成㸔徹霓裳羽衣舞宫袍舞錦花翩翩詩成毛骨生清寒飛章贈我歸剡川推篷月在梅花邊觀魚亭書所見披雲仙子雙眉青一笑不語千娉婷臨風隔水忽何許曼卿空主芙蓉城山齋歸來日色暮四壁黄昏鬼相語城頭嗚嗚角聲曉青山一㸃黄金小贈汪彦升金花鞍覆紅氍毹駑駘振鬛鳴長途龍駒喘汗滴血珠翹首伯樂羞鹽車十年揮金醉皇都白髮閩海猶馳驅臨汀春草梅花舒東風為我先吹噓次李元善求墨韻君不見深源咄咄惟書空徒知怪事填心胸仲将佳製雖㸃漆空凾竟達非桓敵又不見紹宗工𨽻希前人畫腹意與虞公鄰楮陳泓頴擯不用書法遠迨無窮春顛張畫沙有竒悟藏鋒指意誰能嗔我今老矣心未融每愁落筆茫西東蠻牋十様無遠寄忩昏九敗塵埃封鳳樓不修紫毫凍舉手只解遮寒風前賢學書心手閒杯飲自樂何勞鍾李侯懿子金閨郎文章艶艶春葩香銀鈎鐵畫亦竒絶嗜好不羡紅樓粧詩成揮洒每相寄戈波㸃畫遒且剛𤣥香銷磨倐無跡袖手與我同凄凉知君尚方隃糜給使終有時我獨兩鬢蕭颯飛秋霜金鑾夜賜記恩寵玉堂晝步㸔翺翔㑹當倚馬揮九制笑傲何在張君房廷珪真製散絶今已五百祀我無佳惠君何償詩來急索肯違忤祗恐鄰燭無餘光墨堪作字字堪煑徒使我軰偪仄搜枯腸栲栳山人詩集卷中
