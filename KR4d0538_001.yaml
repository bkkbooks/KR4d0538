body:
  text: 栲栳山人詩集卷上元岑安卿撰古詩五言古意四首亭亭千歲松起自一寸植苟無斤斧患壽可比金石青青園中草一雨廻故色清霜忽飄零彫悴在頃刻寳刀不斷水綫溜可穿石君㸔城門軌要非兩馬力為學不苦心虛談政何益偉哉大禹功猶思寸陰惜濬仲執牙筭武子蓄金埒積鏹不能施名穢身亦滅富貴何足云道義自可恱偃蹇彭澤腰不為五斗折江河東入海天漢恒西流感此不息機宴安非良謀農夫務耘植為學奥義求青春厭老大還可囘施不偶讀戴帥初先生壽陳太𫝊用東坡無官一身輕有子萬事足二句為韻有感依韻續其後亦寓世態下劣自己不遇之意云爾飯至即舉筯不問米有無寒風催短褐誰能忍須臾平生耕稼心愧此老病軀掩卷空太息相對慚妻孥貪夫富且壽吉士飢復寒什襲寳燕石白璧泥塗間老成愧苟得童稚羞無官如何羊裘翁不念歸來難登崇任資算用舍計月日善既無所嘉惡政不須嫉是以利禄人處世惟用術吉凶雖無恒萬世徳惟一謗讟我自致勿怨生不辰蒺藜非所據石下遂䧟身始知膠漆心千載雷與陳蠅矢任黒白頺然自天真絺綌不任暑毳褐寒還生寒暑歲相似中心空自驚道義山嶽重富貴浮雲輕念此轉悽惻俛仰何所成人各有所愛我獨不愛酒心清萬慮息恍然開八牖醉人識至樂云入無何有惟餘獨醒翁千載尚吾友憲章千萬條執筆不勞擬事至惟討論倦足成跛倚終然有變通圓池倐方沚歎息無所言神哉孔方子天以一生數積累乃至萬不一事轉多觸目皆恨怨干戈致陵夸可否更替獻緬思結繩時淳風欲遐遠人皆與世同我獨與世異同則譽日生異則毁日至西山采薇翁千古秉髙志斯人不可從催科困王事鷦鷯一枝安䑕飲河易足惟知人爵榮不識天理辱滄溟偃鵾鵬雲霧迷鴻鵠一笑付忘言歸田故山曲王子英舘楊氏作詩自述以柬之項王㧞劍起叱咤天為陰平生萬人敵虞兮淚沾襟我才魚上竹君學猿援林嘆息無與言蕭騷雪盈簮我憐卞和氏獻璞刖其足千載無斯人荆山有遺玉遺玉何足云遺賢難自鬻置身蒿艾中何人為推轂蒲輪逆申公感慨懷漢武為治顧力行所答惟一語寥寥百世下兹事誰復舉高松梁棟材埋沒同草莽狂奴肆故態傲睨萬乗君羊裘不觧結歸釣桐江雲我窮不出戸經籍自討論懷哉孔稚圭空移北山文和李元善自警詩達為天下相窮作人世師窮達有定命勿歎時非時寜汙牛尾泥不作車塵隨山林隠文豹江海潜黄螭人皆嗜奔競奔競人還嗤仲尼與三子出處皆從宜一芥不可與萬鍾亦難辭今人知古人不識來者誰何如沽美酒笑傲歌新詩功業不補世那求後人思人生如樹花開落從風吹又如無根蓬飄飄亦何為天髙日月逺壽命皆崦嵫人兮勿自苦吾道當平夸百鴈圖離離鴻鴈群渺渺水雲國白雪剡川藤𤣥香牧溪跡形真具生意仿彿二百翼四海兄弟情于兹見叙秩前鳴後如應高下低復逆隨陽足稻粱值夜防機弋水寒蘆葉黄霜清葦花白羣逰得所止一氣同恱懌哀哉淮南謠布粟歌斗尺東阿賦豆箕才高終擯斥觀圖適念此翻為古人戚今人猶古人毋為後人惜送鄭學可赴平江學道書院長姑蘇古伯國繁華有遺蹤櫛比十萬家樓臺出鴻濛歌舞徹清夜錦繡圍春風苟無禮義化流蕩将何從子游千載士文學洙泗宗邦人致仰慕築室闤闠中犧牲與籩豆祀事潔且豐育材闡王化道義相磨礱有如砥柱石屹然障河洪吾邦舊文獻近亦多章逢揚子昔長此講貫懋厥功吾子亦云往辭色温其恭薫風揭絳帳臯比座蒙茸願精學道㫖再使民俗忠我當踵季札觀風一來同食新筍黄虀甕已竭占䐹筐亦空老芥長芒刺食乆咽為痛山雨拆竹胎未入春盤供畦丁適踵門致我親戚送脫綳錦紋散切玉霜刀弄新香歕湯鼎饞涎迸齒縫未倩摉詩腸已破食肉夢參禪誠滑稽煑簀宜笑閧賛寜譜亦佳涪翁句堪誦僻居東海偏斯味時一中山僧應厭餐飽食聽春哢三哀詩厲先生無咎李先生碧峯高先生師魯厲公予先師侃侃國髦士文詞奮白屋名識動丹扆帝郷眷遇殊曲宴錫豐侈青衫何足云倐忽期顯仕云胡尉苕溪露泣秋萱死朔風撼南極黄屋繼隳圮歸栖從山雲松柯蔭琴史淚揮新亭悲詩窮黍離㫖雪霜轉侵凌故里不可止漂泊海東西生計日彫靡暮年賦歸歟幸遂首丘志遺經惜無傳嗣續但耘耔死别三十春悵未致一慰何當馬鬛封秋菊薦寒水右故厲先生先生諱元吉字無咎號半村宋末舉進士第為烏程尉我憶摠角初羣立侍師魯蒼然太古姿眉髮乘素縷慨思英發時濟濟整風度承家二百䙫衣冠踵餘武馳騁文藻林濩落老無遇轉眄五十春國祚倐非故荒凉東海濵誰復嗟罄窶幸餘慈溪翁詩文接情素孫枝復萎折宗祏凛無主斯文竟何辜不綴一綫緒嗟予三世交念此轉増慕蕭蕭豫樟風悲號惘難訴右故高先生先生字師魯里先儒吾鄉山水佳間世産英特邇來百年間接武愧寥寂蒼蒼栲栳峯東西峙空碧先生擅斯名挺挺无愧色馳聲翰墨塲群彦咸辟易五色日迷眼造物秘莫測餘年付詩酒琴書自朝夕晚交無功師妙語契金石談空眇生死實以貧賤戚青衫固不就縱就國歩革凄凉文㑹基狐兎穴遺甓我生恨後時不及風采識空餘書一編焚香得繙繹右故李先生先生字天錫號碧峯里先儒弔高仲煒秋蟾東海彦文緒支一木悃欵無所為筆耕繼饘粥馳騁山水懷泓渟經史腹光潜珠入淵徳隠玉韞櫝辨博沃同志沈黙瞬流俗人謂静者壽命乃如轉燭分袂未二旬一疾竟困踣寡妻抱遺經號呼無可屬哀哉同門友付託渺一粟炎凉世事變誰奠生芻束蒼蒼林湖山玉樹埋荒麓白雲如有知為我伴幽獨送易直兄入京渥洼産良驥振鬛鳴天衢力雖任逺重赤汗流殷珠兄材足馳騁惜為百里拘善政無浪譽鄙彼訐直徒琴堂風日閑疲氓自春蘇邇來觧組歸實笑樂友于攬轡忽言别觸熱之皇都風波幸寜息道途諒無虞糓禄天所與慎勿權門趨銅章綰緑綬昔日青氊儒我猶寧生龜曵尾甘泥塗兄今逺行邁所願當何如功名固宜朂更寄加食書述古四章送范瑞卿囘越陶朱五湖客相業霸于越十年思復仇一舉强國滅扁舟烟水間千載仰遺烈子今居是邦景慕有前轍試吏固云始時至亦宏達其一莱蕪漢佳士游宦不厭貧辭友太尉府甑釡生魚塵緬惟清儉操千載聞一人子今舉無玷得禄思養親嘗聞饘粥絶升斗謀諸鄰其二司𨽻百世士攬轡思澄清生罹黨錮禍殁有盖世名善類既銷歇漢祚亦云傾子材固不逮識此已足稱善人不可見千載思雲礽其三文正将相才憂國還憂民大開天章閣姦邪日逡廵至今姑蘇田利澤及後人試吏計資筭積累猶涓塵功名苟樹立富貴何足云其四盆蘭猗猗紫蘭花素秉岩穴趣移栽碧盆中似為香所誤吐舌終不言畏此塵垢汚豈無高節士幽深共情素俛首若有思清風颯庭戸為題慶元路太守雍吉刺氏傳家録書答鄭景尹東風墜雲翰陋室生光輝重沐一開緘慰我乆别思為言樂道善速我褒賢詩恭惟侍讀翁忠孝世所知清容人中彦草廬天下師二老既有作我焉敢措詞及觀家乗叙潜徳良無遺自揆非巧匠縮手惟嗟咨吾聞許文正道徳開皇基文明耀中土四裔猶蚩蚩譯經入國語訓廸良在兹所以化庭貴撫字皆倫彛埜堂嗣爵秩來守甬水湄濊澤被民庶懋徳隆本支擇配貳帝室萬國瞻母儀王正肇厥始諸公詠重熈大哉聖人道終古常如斯題王氏三薌圖春風桃李花秋雨梧桐樹人心自悲喜草木那知故三香各根柢氣色偶一類凄凉氷雪魂敻絶霜月趣人惟知其然遂有兄弟喻花豈識友于人自生好惡吾聞登徒子好色耽傴僂又聞海上翁逐臭慕腥腐世人溺嗜好顛倒死不悟君今眷兹香志意實清苦流芳當無窮萬古復萬古夢中作積雨稍開霽晴川棹孤舟雙目豁陰翳四望餘雲收輕風生衣袂洒洒舒煩憂橋横落日逈水與山俱流白鷗洲渚凉黄鳥林塘幽十旬九陰雨兹晴信難求美景與心㑹及暮猶遲留賔朋愜清賞晤語更獻酬歸途見明月華顛風颼颼送景融姪之淛宴安人鴆毒我老羞無聞知汝行有日送汝寧無言汝父早即世汝子衣猶斑汝弟頗知學且識應門難别家思自奮託蔭薇花垣王侯近下士接待禮尤寛人視所為主結交愼扳援期汝在遠大囑汝猶殷勤蛟龍蟄深壑變化斯須間鵰鶚志霄漢奮迅凌風翰錢塘萃佳麗比屋人烟繁寢食須自謹勿躡春風門酌此一杯酒我心愈憂煩功名倘相遂寄我歸來篇謝汪辰良太守祈雨有應赤日露頂行歩入南雷去歸来雲霧生薄暮雨如注蒼蒼将槁苗欝欝色如故人言太守賢天意肯相助不喜亦不驚太守若無與日月行中天照臨及下土日月不自功光明萬民睹我知太守心借此以為喻試問喻者誰三山老農圃董止菴詩巻道人名止菴其實無所止不搆草木廬不􅓯土石址惟於寓居堂揭扁字盈咫偉哉磐石書古𨽻遒且美㕓市固煩囂自得塵外致開扄睨龍泉嵐光動闌几中凾玊笈文鱗比積經史朝翻暮紬繹刻志究𤣥理著書混三教牽令同一軌示予得披閱愧未參奥㫖出語如湧泉辨析至於是性心既超脱好尚世所異朝行携赤藤逍遙舜江市夜息數清漏靈臺湛秋水我嘗問道人請析止之義仁敬慈孝信五者孰可已道人笑未言欲答如有擬緡蠻黄鳥聲翛然起岑蔚題月波圭大章先月亭人必貴虚明月色愛端正旁死還哉生以漸至圓凈誰於既望宵分此先後景亭依水西滸月出山東嶺孤光一離天即破亭色暝慿闌對東湖㶑灔一千頃惟憐亭西隅陰隂尚幽映一輪固圓明未盡滿月境何如到天心山河了無影和濟夭㟁法師約李五峯同遊韻我不識往古誰復知來今彼哉牛山淚祗濕當時襟節序倐代謝秋風生樹林暑氣日已薄涼氣日已深酌我新􅍄酒鳴我素蓄琴陶然一今古萬事從無心行行風波途著脚殊未稳榮名非素懷飄忽任衰晚嗟哉聖賢心明白寄黄巻如何當世人交深語翻淺所以靖節翁抛官托罷蹇長歌歸去來高風播彌逺醜婦怯青鏡當春强歡媚佳人餙紅芳祗恐老日至清修歲可延嬋娟色難恃松喬悟兹理倐遂高舉志君今五雲居湖山迹先寄相從殊有懷誅茅恨无地窮居越東海西望越山翠越山何葱蘢中有五雲起美人隔重江交㑹日遊恣詩文賞清新世道任豐悴吾聞宛陵翁窮乃詩所累君今猶筆畊斯窮得無自雞鳴夜起舞志士慘不眠稽山稱達觀看鴻復揮弦何如息心虛從物更後前我惟囿大化不計脆與堅聞道寧一日穢徳終百年盗跖富且壽天理何其偏用韻簡休遠上人乾坤散清氣詩文肆呶哇謳吟出天然豈事攫與拏金鑾敝貴幸玉燭歌調和蘇黄與李杜後繼今誰家輝光掩朝蝀綺麗欺春葩温然恱情性清矣寒齒牙顧予私淑人景慕空年華古來蔬筍林味此間亦嘉名雖厠俊髦迹每沈邱阿一斑窺管豹兩部聽春蛙苟無入神趣徒若纒病疴禪林得幻悟學業日以加綫溜濺崖壑終焉赴洪河大輅鳴和鈴愼勿較柴車前詩舉相戱勿謂語意頗宗門說圓頓寳偈河沙多師當復悟此行坐甄叔迦次兹息菴冬日海棠韻盈盈宫錦仙厭彼繁華塲當春不自獻婉娩懷無方杞根旃檀林金仙借恩光群陰正凝沍特與囘春陽扼霜宜媿死江梅亦羞香翻令桃李顔應有趨時傷定惠一笑姿未免隨春芳始信鶴林仙解逞非時籹追和韋蘇州種𤓰詩韻盖有所感也羣耕斥鹵地此計誠迂踈種𤓰春夏交幸不致荒蕪青丸熟秋寳漲水為漂如天笑世難測詎敢尤耘鋤農家刈秔稻我乃憂空虛逺思韋蘇州不如坐觀書和李宰韻春風吹繁花秋露浄孤月壮年嗜好新對此每傾恱年來百念灰搔首惟短髪流光不我與苔生古人骨常懷却世紛宴坐學龜息心乎茂叔蓮興乃子猷竹從渠鵬去留不問馬得失李侯宦游蹤來僦海上宅庭蘭茁春芽笑語落霏雪詩文嘗我過老晦資啓發窮思獨善身自獻殊未刖對酒還當歌甘㫖宜朝夕君心與我懷相對交歎息送張廵檢滿任歸冀寧蓬萊海中雲太行天下脊相去萬餘里可望不可即君騎學騮馬捧檄來夙昔焉知冀北材絆此江南役肅肅氷霜姿翩翩水雲迹三載職廵邏公餘目經籍我老厚交契相過惟咫尺平生詩酒懷公田足香秫朱樓俯官道向水光的皪開簾見青山徙倚生恱懌海氛忽憑陵蒙衝肆攻擊弓開新月彎劍倚秋空碧跋涉洪濤中歸語心戚戚惟喜山谷間穿窬自寧息花村犬生氂民庶安種植解龜及初秋薦剡已騰陟大初助褒詞憲府終見辟雙溪風月清往矣無愧色儀式著宏綱臨事須謹飭灌畦灌畦起清晨汲水甘自勞微露濕裳屐凉風吹鬂毛緬懷漢陰丈東陵亦其曹顧予何為者佚豫敢自驕日午得偃息讀書志彌高年饑見秔稻萬民免煎熬寄跡天壤間于焉遂逍遥洞山十詠輪囷屈拏勢偃蹇蟠伏影山神懼飛騰縶縳藉藤綆斤斧不敢施蟄卧恐其醒鱗甲生陰風颯我毛骨冷右松龍子陽千載魂化石疑未死脹腹猶彭亨屹此自尊鬼怒氣足倡勇能為越王起坎井樂苟安焉知東海水右蛙石鎔鑄匪鑪冶寒液凝不裂雖無磨淬工俯視香奩揭能湔百慮空了不見生滅水鑑惟外形心淵湛秋月右鏡池孤根懸倒影彷彿浮靈槎踈踈枝間雪淡淡波中花松竹復相亞偃蹇同欹斜折香汲深寒清供推禪家右梅沼竒形奮雄武可拜不可觸雖無三品封閱世知幾國似逃秦王鞭來聽山鬼哭翻思雷萬春受矢如槁木右将軍石山谿本嶄岩著脚畏頑石何人琢𤣥璞甃壘界墨色恍疑踏鯨背歩武便短屐日暮知僧歸山空聞卓錫右烏石嶺日光爛陰崕壮氣振林木炳炳金錢斑霧澤文彩足夜深忽咆吼驚却老僧宿起視山月高餘音在空谷右豹闗崖陰滴珠璣清蓄鮫人泣甆罌汲新寒滿貯歸湏急外滲如方諸中乾匪人吸君看鉛汞流金鐵猶漏濕右透瓶泉石束清溪流琮琤玉聲碎如聞操履霜墮却思親淚伯牙寡所知鍾期乃同志至今流水音寥寥在兹地右琴峽誰知廣寒宫有此嘉樹植年年風露中黄金吐秋色秋色天上來開軒為我得笑彼揮斧翁勞生竟何益右桂軒吳南伯王子英李元善㑹于林湖資敬庵各有詩予遂叙和役役歲将暮閑暇不易得高賢㑹山阿恨此雲霧隔敬亭新歸人金臺舊遊客偕彼東臯翁於焉話疇昔心契金蘭交意探山水跡我窮不出門頗覺天地窄君雖倦遊歸有志終致澤長歌楚狂詞痛哭賈生策努力青雲衢毋使頭遽白魚潜碧淵中鳶戾青雲表志士各苦心肯嗜顔色好聲氣幸不殊詩書事探討賡歌叙繾綣翰墨逓揮掃三英倐胥㑹翠崦深杳杳有同松竹梅凌寒挺清峭我亦物外人胸懷自明了退藏豈余心畏此風波浩未言折鎗鎗政坐汚皦皦古道日淪䘮交誼今復少如何二三子真情見懷抱倘可立下風毋譏原壤老懷古淵明晉徵士子雲莽大夫超然歸去辭深哉太𤣥書文詞重金石軒冕輕錙銖恬退各有闕辨賢愚焉知千載下直筆逢董狐富貴何足云節義斯良圗奈何今世士草間乞為奴首鼠幸脫兎辱國心何如嗟嗟白野公肝腦汙泥塗見道固明白殺身似糢糊讀我懷古詩後賢其監諸寄興示諸子田園日蕪穢衰邁不自治童僕肆踈嬾子孫習娛嬉良苖雜稂莠𤓰瓞纒蒺藜草深狐兎聚水積蛙蚓滋念兹每獨往邈焉起遐思世事亦如此重令我心悲送任正之旋里君居東海國投轄思釣鰲持竿三十年歸來鬂蕭騷六鰲不可得動盪空波濤䟦渉山海間力費心徒勞惟餘詩酒興不負平生豪朅來三山居燕坐樓閣高開忩納新月展席延清飈此樂我所嗜爽氣生膚毛世人附炎熱反為我輩嘲窮冬雨雪途竹輿替蘭橈歸隠五磊岑俯視雙丸跳何當共登覽長嘯青雲霄題舊紈扇去年壁上扇蒼蒼生網蟲今年承拂拭還有去年風自憐顔色改得入君懷中願言新舊人恩寵長相同次韻桂懷英以詩寄謝元善及宗昭姪軰暮夜見訪窗虛月炯炯林近風颼颼梅花照我室緬想羅浮遊羅浮浸碧海騎鯨夢中求風凄花月白毛骨清寒瘳坡翁不可見浩興無與酬歸來二三子謳吟愜狂謀敲門索美酒燈影摇玊舟誰能合汚俗庶足同清流為言立仗馬何似忘機鷗董溪月中仙乘鸞海東頭我思一見之足往心還留寄聲妙年客瞿翁不勝秋簡從山僧亮明道普明山中僧瀟洒雲外客肅賔天竺堂步武愼規式山中五千指湖海視儀則斯時虎岩翁宴坐躬誨益瓶錫如流泉請謁無虚席吾師解周旋雲衲舉欣懌送迎盡禮貌衆譽日輝赫髙座忽傾圮拂袖歸故域從容細行中止觀恣温繹諸山積餘資潤屋侈華飾飛甍切雲霓廣畝連阡陌豈惟服食豐少艾亦充斤國朝極尊崇我軰徒歎息一朝命令下俾齒齊民役徵輸與輓漕鞭箠困驅策於以甦疲民于以警貨殖惟師樂恬退儲蓄僅朝夕昔有無田譏今無有田戚所以閑雅懷得遂游覽舄今秋積雨餘訪我海東磧田衣影翩翩屐齒響苔石我逃空谷中聞之喜盈色一尊對黄花真意頗週悉俯仰出贈言拈毫冩胸臆倒囊答新響明月光的皪生我蓬蓽輝啓我茅徑塞復為重峰行幽探山水賾兹山多俊彦感歎已非昔顒顒大章公叢林服英識斯人不可見俛仰但陳迹歸來叙别懷晤語轉悽惻吾宗子孫多且復倒餘瀝鄰家有新酤解佩奚足惜欣欣笑語間禮度悆嚴約我山中游可以已羸疾詎意承新交出語見悃愊兹行固未逮厚意殊感激何當具扁舟行艤半山側一笑過石橋攀蘿共登陟摩挲兩青瞳遙睇南山碧次元善喜雨韻石燕拂雲杪河魚落簷前天公半月雨下土舒憂湔槁壤蚓發唱素壁蝸留涎禾蔬欝嘉秀樂彼田與園既無溝壑虞體受期歸全揷架有遺軸足以消餘年次雷子樞知事延平八詠韻以下皆延平作寳劍龍入水千載猶可見春風動鱗甲浪舞桃花片一息過天池相期曲江宴右龍津春浪風高掃炎瘴猿嘯破昬昧聖學醒羣蒙觸景與心㑹我思住山中伊誰致芳酎右猿洞秋風峩峩金鳳山紺宇各雄占佛境本無殊人心有欣厭雲從何處來普覆青蘿厂右三寺雲深羣峰西南來疊翆環且聚絶頂生夜凉光浮玊毫兎沆瀣洗我心髙吟振寰宇右九峰月朗白鶴去不返仙歸已無日大明生東維光粲神丹室我來弔遺蹤惟見跳丸赤右梅山朝旭翠微爛五色廻光動仙舍誰移赤城霞來展延平畫躋扳遠莫遂沈吟日西下右演仙晴霞泉流山忽斷急濺落懸壁梁石見天機竅竹給民食賢哉賽侯功豐碑宜百尺右中峯飛瀑建溪東南流灘石獰可怖黯淡束竒險過此始無慮囘思太行山亦有摧車路右黯淡雄濤官含偶成宿雨生晚凉幽禽在高樹披衣出門看溪流急如注草木被新渥青山滿公署偶為城郭居獲此林下素鄰家酒如澠歌管朝夕度此樂非我知看書日還暮傷心行用李長吉韻朔風動清吟孤月流寒素白髮困青燈紅粧泣秋雨羅扇沿網蟲寳鑑青鸞舞白晝魍魎行山昬鬼無語詠范氏池亭虛亭巧結構有此觀魚境碧沼風生紋高林月留影花竹列我前松杉瘦而頴山環翡翠屏水瑩琉璃井書生東海來山水頗深省喜有鄭家湖詩文每相警栲栳山人詩集巻上
